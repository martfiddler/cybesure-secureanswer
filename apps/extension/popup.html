<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #f5f7fb;
      }
      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 12px;
        font-weight: 700;
      }
      input {
        border: 1px solid #c6d1e0;
        border-radius: 8px;
        padding: 9px;
      }
      button {
        background: #00c8e0;
        border: 0;
        border-radius: 8px;
        color: #061424;
        cursor: pointer;
        font-weight: 700;
        padding: 10px 12px;
        width: 100%;
      }
      .muted {
        color: #66758a;
        font-size: 12px;
        line-height: 1.4;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>Cybersure Autofill</h3>
    <p class="muted">Paste your API URL and JWT from the web app session.</p>
    <label>
      API URL
      <input id="apiUrl" placeholder="https://your-api-url" />
    </label>
    <label>
      JWT token
      <input id="token" type="password" placeholder="Bearer token" />
    </label>
    <button id="save">Save settings</button>
    <button id="fill" style="margin-top: 8px">Autofill current page</button>
    <p class="status" id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
