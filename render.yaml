services:
  - type: web
    name: cybersure-secureanswer
    runtime: node
    plan: starter
    buildCommand: npm install --build-from-source
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: APP_URL
        value: https://cybersure-secureanswer.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WC_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "CybeSure SecureAnswer <noreply@cybersure.co.uk>"
      - key: ALLOWED_ORIGINS
        value: https://cybersure-secureanswer.onrender.com,https://cybersure.co.uk
      - key: DB_PATH
        value: /opt/render/project/src/db/cybersure.db
