services:
  - type: web
    name: cybersure-api
    env: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm run start:api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cybersure-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: cybersure-postgres
    plan: starter
